<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Following | Oh sheet!</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; color: #3EFF8B; font-family: 'Ubuntu Mono';">
        <div class="loader-content"><p>Loading Following Feed...</p></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-section nav-section-left"><img src="img/full-logo.png" alt="logo"></div>
        <div class="nav-section nav-section-center">
            <div class="icon-wrapper"><a href="feed.html"><i class="fa-solid fa-house"></i></a></div>
            <div class="icon-wrapper"><a href="create-post.html"><i class="fa-solid fa-pen-nib"></i></a></div>
        </div>
        <div class="nav-section nav-section-right">
            <div class="nav-profile-wrapper">
                <a href="profile.html" class="profile-link">
                    <img src="img/dp.jpg" alt="PFP" id="nav-user-pfp">
                    <span id="nav-username">Guest</span>
                </a>
            </div>
        </div> 
    </nav>

    <aside class="sidebar-left">
        <div class="sidebar-top">
            <div class="icon-wrapper"><a href="feed.html"><i class="fa-solid fa-house"></i></a><span class="icon-name">Home</span></div>
            <div class="icon-wrapper"><a href="following.html"><i class="fa-solid fa-user-group"></i></a><span class="icon-name">Following</span></div>
        </div>
    </aside>

    <main class="sidebar-middle">
        <h2 style="color: white; text-transform: uppercase; margin-bottom: 20px;">Following Feed</h2>
        <div id="following-feed">
            <div id="feed-loader" style="color: white; text-align: center; padding: 20px;">Loading your circle...</div>
        </div>
    </main>

    <div id="post-modal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <button class="close-modal" onclick="closePostModal()"><i class="fa-solid fa-xmark"></i></button>
            <div id="modal-post-content"></div>
            <div class="modal-comments-section">
                <div id="modal-comments-list"></div>
                <div class="comment-input-wrapper">
                    <textarea id="modal-comment-text" placeholder="Write a comment..."></textarea>
                    <button id="submit-modal-comment">Post</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="script.js"></script>
</body>
</html>
