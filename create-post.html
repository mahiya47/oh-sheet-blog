<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create | Oh sheet!</title>
    <link rel="icon" type="image/png" href="/img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Wet+Paint&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <nav class="nav-bar">
        <div class="nav-section nav-section-left">
            <img src="/img/full-logo.png" alt="logo">
        </div>

        <div class="nav-section nav-section-center">
            <div class="icon-wrapper">
                <a href="/index.html"><i class="fa-solid fa-house"></i></a>
                <span class="icon-name">Home</span>
            </div>
            <div class="icon-wrapper">
                <a href="/create-post.html"><i class="fa-solid fa-pen-nib"></i></a>
                <span class="icon-name">Create a post</span>
            </div>
            <div class="icon-wrapper">
                <a href="/support.html"><i class="fa-solid fa-headset"></i></a>
                <span class="icon-name">Support</span>
            </div>
        </div>

        <div class="nav-section nav-section-right">
            <div class="search-container">
                <input type="text" placeholder="Search..." class="search-input">
                <span class="search-slash"><i class="fa-solid fa-magnifying-glass"></i></span>
            </div>

            <div class="nav-profile-wrapper">
                <a href="/profile.html" class="profile-link">
                    <img src="/img/dp.jpg" alt="PFP" id="nav-user-pfp">
                    <span id="nav-username">Guest</span>
                </a>
                <div class="nav-dropdown">
                    <a href="/profile.html"><i class="fa-regular fa-user"></i> Visit Profile</a>
                    <a href="/setting.html"><i class="fa-solid fa-gear"></i> Settings</a>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="logout-link" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
                </div>
            </div>
        </div> 
    </nav>

    <aside class="sidebar-left">
        <div class="sidebar-top">
            <div class="icon-wrapper">
                <a href="/explore.html"><i class="fa-solid fa-compass"></i></a>
                <span class="icon-name">Explore</span>
            </div>
            <div class="icon-wrapper">
                <a href="/trending-posts.html"><i class="fa-solid fa-fire"></i></a>
                <span class="icon-name">Trending</span>
            </div>
            <div class="separator"></div>
            <div class="icon-wrapper">
                <a href="/about.html"><i class="fa-solid fa-circle-info"></i></a>
                <span class="icon-name">About Oh Sheet!</span>
            </div>
        </div>
        <div class="sidebar-bottom">
            <div class="separator"></div>
            <div class="icon-wrapper">
                <a href="/privacy-policy.html"><i class="fa-solid fa-shield-halved"></i></a>
                <span class="icon-name">Privacy Policy</span>
            </div>
            <div class="icon-wrapper">
                <a href="/rules.html"><i class="fa-solid fa-scale-balanced"></i></a>
                <span class="icon-name">Rules</span>
            </div>
            <div class="icon-wrapper">
                <a href="/agreement.html"><i class="fa-solid fa-file-contract"></i></a>
                <span class="icon-name">Agreement</span>
            </div>
            <div class="separator"></div>
            <div class="icon-wrapper">
                <a href="/setting.html"><i class="fa-solid fa-gear"></i></a>
                <span class="icon-name">Settings</span>
            </div>
        </div>
    </aside>

    <main class="sidebar-middle">
        <div class="editor-container">
            <div class="editor-header">
                <h1>Create a New Sheet</h1>
                <a href="/index.html" class="close-editor"><i class="fa-solid fa-xmark"></i></a>
            </div>

            <div class="editor-body">
                <div class="editor-input-group">
                    <label>Content</label>
                    <textarea placeholder="Write your thoughts or paste code here..." class="editor-textarea"></textarea>
                </div>

                <div class="editor-toolbar">
                    <button class="tool-btn"><i class="fa-solid fa-bold"></i></button>
                    <button class="tool-btn"><i class="fa-solid fa-italic"></i></button>
                    <button class="tool-btn"><i class="fa-solid fa-code"></i></button>
                    <button class="tool-btn"><i class="fa-solid fa-image"></i></button>
                </div>

                <div class="editor-input-group">
                    <label>Tags</label>
                    <input type="text" placeholder="e.g. python, tutorial" class="editor-tags">
                </div>
            </div>

            <div class="editor-footer">
                <button class="cancel-btn" onclick="window.location.href='/index.html'">Discard</button>
                <button class="publish-btn">Post Sheet</button>
            </div>
        </div>
    </main>

    <aside class="sidebar-right">
        <section class="trending-card">
            <h2 class="trending-header">Trending Posts</h2>
            <div id="trending-container">
                </div>
            <a href="/trending-posts.html" class="show-more-link">View all posts</a>
        </section>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/script.js"></script>
</body>
</html>
