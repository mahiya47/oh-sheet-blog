<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Sheet-storm! | Oh Sheet!</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-box signup-box">
            <div class="login-logo">
                <i class="fa-solid fa-bolt-lightning"></i>
            </div>
            <h2>Create Account</h2>
            <p class="login-subtitle">Join the community and start sharing sheets.</p>

            <form>
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Full Name" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-at"></i>
                    <input type="text" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>

                <div class="signup-terms">
                    <label class="checkbox-container">
                        <input type="checkbox" required>
                        <span class="checkmark"></span>
                        I agree to the <a href="rules.html">Rules</a> and <a href="agreement.html">User Agreement</a>.
                    </label>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <div class="login-footer">
                <p>Already have an account? <a href="sign-in.html">Sign In</a></p>
                <div class="separator" style="width: 100%; margin: 20px 0;"></div>
                <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

</body>
</html>
