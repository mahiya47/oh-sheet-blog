<body class="login-body">
    <div id="loading-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; color: #3EFF8B; font-family: 'Ubuntu Mono';">
        <div class="loader-content">
            <i class="fa-solid fa-sheet-plastic fa-spin" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <p>Verifying Session...</p>
        </div>
    </div>

    <div class="login-container">
        <div class="login-box">
            <h1 class="login-logo">Oh sheet!</h1>
            <p class="login-subtitle">Create your account</p>
            
            <form id="signup-form">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="signup-username" placeholder="Username" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="signup-email" placeholder="Email Address" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="signup-password" placeholder="Password" required>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <div class="login-footer">
                <p>Already have an account? <a href="index.html">Sign In</a></p>
                <a href="feed.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="script.js"></script>
</body>
</html>
