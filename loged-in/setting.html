<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica+SC&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Settings - Oh sheet!</title>
</head>
<body class="settings-body">

    <div class="settings-container">
        <aside class="settings-sidebar">
            <h2 class="settings-title">Settings</h2>
            <nav class="settings-nav">
                <a href="#profile" class="active"><i class="fa-solid fa-user"></i> Profile</a>
                <a href="#account"><i class="fa-solid fa-gears"></i> Account</a>
                <a href="#appearance"><i class="fa-solid fa-palette"></i> Appearance</a>
                <a href="#notifications"><i class="fa-solid fa-bell"></i> Notifications</a>
                <a href="#privacy"><i class="fa-solid fa-lock"></i> Privacy & Security</a>
                <a href="index.html" class="exit-settings"><i class="fa-solid fa-arrow-left"></i> Back to Blog</a>
            </nav>
        </aside>

        <main class="settings-content">
            <section id="profile" class="settings-section">
                <h3>Public Profile</h3>
                <div class="profile-upload">
                    <img src="img/dp.jpg" alt="Profile Picture">
                    <button class="change-btn">Change Photo</button>
                </div>
                <div class="settings-group">
                    <label>Display Name</label>
                    <input type="text" value="mahiya47">
                </div>
                <div class="settings-group">
                    <label>Bio</label>
                    <textarea placeholder="Tell the world about yourself..."></textarea>
                </div>
            </section>

            <section id="appearance" class="settings-section">
                <h3>Appearance</h3>
                <div class="settings-group-row">
                    <span>Dark Mode</span>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </section>

            <section id="danger-zone" class="settings-section">
                <h3 class="danger-text">Danger Zone</h3>
                <button class="delete-btn">Delete Account</button>
            </section>
            
            <div class="settings-actions">
                <button class="save-btn">Save Changes</button>
            </div>
        </main>
    </div>

</body>
</html>
