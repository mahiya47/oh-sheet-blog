<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In | Oh sheet!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-logo">Oh sheet!</h1>
            <form class="login-form">
                <div class="input-group"><input type="email" placeholder="Email" required></div>
                <div class="input-group"><input type="password" placeholder="Password" required></div>
                <button type="submit" class="submit-btn">Sign In</button>
            </form>
            <div class="login-footer">
                <p>New here? <a href="create-account.html">Create an account</a></p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
