<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica+SC&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">

    <title>Oh sheet!</title>
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>

    <nav class="nav-bar">

            <img src="/img/full-logo.png" alt="logo">

        <div class="nav-section nav-section-center">
            <div class="icon-wrapper">
                <a href="#"><i class="fa-solid fa-house"></i></a>
                <span class="icon-name">Home</span>
            </div>
            <div class="icon-wrapper">
                <a href="#"><i class="fa-solid fa-pen-nib"></i></a>
                <span class="icon-name">Write</span>
            </div>
            <div class="icon-wrapper">
                <a href="#"><i class="fa-solid fa-book-open"></i></a>
                <span class="icon-name">Read</span>
            </div>
            <div class="icon-wrapper">
                <a href="#"><i class="fa-solid fa-bolt"></i></a>
                <span class="icon-name">Trending</span>
            </div>
        </div>

        <div class="nav-section nav-section-right">
            <div class="search-container">
