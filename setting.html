<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Oh sheet!</title>
    <link rel="icon" type="image/png" href="/img/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="settings-body">

    <div class="settings-container">
        <aside class="settings-sidebar">
            <h2 class="settings-title">Settings</h2>
            <nav class="settings-nav">
                <a href="#profile" class="nav-tab active" data-section="profile"><i class="fa-solid fa-user"></i> Profile</a>
                <a href="#account" class="nav-tab" data-section="account"><i class="fa-solid fa-gears"></i> Account</a>
                <a href="#appearance" class="nav-tab" data-section="appearance"><i class="fa-solid fa-palette"></i> Appearance</a>
                <a href="feed.html" class="exit-settings"><i class="fa-solid fa-arrow-left"></i> Back to Blog</a>
            </nav>
        </aside>

        <main class="settings-content">
            <section id="profile-section" class="settings-section active">
                <h3>Public Profile</h3>
                <div class="profile-upload">
                    <img src="img/dp.jpg" alt="Profile Picture" id="settings-pfp-preview">
                    <input type="file" id="pfp-input" hidden accept="image/*">
                    <button class="change-btn" onclick="document.getElementById('pfp-input').click()">Change Photo</button>
                </div>
                <div class="settings-group">
                    <label>Display Name</label>
                    <input type="text" id="settings-display-name" placeholder="Your name">
                </div>
                <div class="settings-group">
                    <label>Bio</label>
                    <textarea id="settings-bio" placeholder="Tell the world about yourself..."></textarea>
                </div>
            </section>

            <section id="account-section" class="settings-section">
                <h3>Account Settings</h3>
                <div class="settings-group">
                    <label>Email Address</label>
                    <input type="email" id="settings-email" disabled>
                    <small style="color: #888;">Email cannot be changed directly.</small>
                </div>
            </section>

            <section id="appearance-section" class="settings-section">
                <h3>Appearance</h3>
                <div class="settings-group-row">
                    <span>Dark Mode</span>
                    <label class="switch">
                        <input type="checkbox" checked id="dark-mode-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </section>
            
            <div class="settings-actions">
                <button class="save-btn" id="save-settings-btn">Save Changes</button>
            </div>
        </main>
    </div>
    
    
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="script.js"></script>
</body>
</html>
